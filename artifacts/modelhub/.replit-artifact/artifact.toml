kind = "web"
previewPath = "/"
title = "ModelHub"
version = "1.0.0"
id = "artifacts/modelhub"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21529

[services.development]
run = "pnpm --filter @workspace/modelhub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/modelhub", "run", "build" ]
serve = "static"
publicDir = "artifacts/modelhub/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21529"
BASE_PATH = "/"
